<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        form { background: white; padding: 25px; border-radius: 8px; max-width: 500px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        label { font-weight: bold; width: 45%; }
        input, select { width: 50%; padding: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>Heart Disease Risk Assessment (11-Feature Model)</h2>
    
    <form action="/predict" method="POST">
        <div class="input-group"><label>Age:</label><input type="number" name="age" required></div>
        <div class="input-group"><label>Glucose (mg/dL):</label><input type="number" name="glucose_mg_dl" required></div>
        <div class="input-group"><label>Cholesterol (mg/dL):</label><input type="number" name="cholesterol_mg_dl" required></div>
        <div class="input-group"><label>Systolic BP:</label><input type="number" name="systolic_bp" required></div>
        <div class="input-group"><label>Diastolic BP:</label><input type="number" name="diastolic_bp" required></div>
        <div class="input-group"><label>BMI:</label><input type="number" step="0.1" name="bmi" required></div>
        <div class="input-group"><label>Heart Rate:</label><input type="number" name="heart_rate" required></div>

        <div class="input-group"><label>Gender:</label>
            <select name="gender"><option>Male</option><option>Female</option></select></div>
        <div class="input-group"><label>Smoking Status:</label>
            <select name="smoking"><option>No</option><option>Yes</option></select></div>
        <div class="input-group"><label>Alcohol Consumption:</label>
            <select name="alcohol_consumption"><option>No</option><option>Yes</option></select></div>
        <div class="input-group"><label>Physical Activity:</label>
            <select name="physical_activity"><option>Low</option><option>Medium</option><option>High</option></select></div>
        <div class="input-group"><label>Family History of Heart Disease:</label>
            <select name="family_history"><option>No</option><option>Yes</option></select></div>

        <button type="submit">Calculate Risk Probability</button>
    </form>

    {% if prediction_text %}
        <h3 style="color: #c00;">{{ prediction_text }}</h3>
    {% endif %}

</body>
</html>
